[package]
name = "tauri-solid-app"
version = "0.1.0"
description = "Tauri + Solid App"
authors = [ "you" ]
edition = "2021"

[lib]
name = "tauri_solid_app_lib"
crate-type = [
  "staticlib",
  "cdylib",
  "rlib"
]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = [ "derive" ] }
serde_json = "1"
