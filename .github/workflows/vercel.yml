name: Vercel Deploy

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v7
        with:
          node-version: 24

      - uses: cargo-bins/cargo-binstall@main

      - name: Install wasm-pack
        run: |
          rustup target add wasm32-unknown-unknown
          cargo binstall wasm-pack --no-confirm

      - run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Set deploy target
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            echo "VERCEL_ENV=production" >> "$GITHUB_ENV"
            echo "PROD_FLAG=--prod" >> "$GITHUB_ENV"
          else
            echo "VERCEL_ENV=preview" >> "$GITHUB_ENV"
            echo "PROD_FLAG=" >> "$GITHUB_ENV"
          fi

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment="$VERCEL_ENV" --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Project Artifacts
        run: vercel build $PROD_FLAG --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy Project Artifacts to Vercel
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt $PROD_FLAG --token="${{ secrets.VERCEL_TOKEN }}" 2>&1 | grep -oE 'https://[a-zA-Z0-9.-]+\.vercel\.app' | tail -1)
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "Preview: ${{ steps.deploy.outputs.url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
