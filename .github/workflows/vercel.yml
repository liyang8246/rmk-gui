name: Vercel Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v7
        with:
          node-version: 24

      - uses: cargo-bins/cargo-binstall@main

      - name: Install wasm-pack
        run: |
          rustup target add wasm32-unknown-unknown
          cargo binstall wasm-pack --no-confirm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build:web

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project context
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Assemble Vercel Build Output
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/* .vercel/output/static/
          echo '{"version":3,"routes":[{"handle":"filesystem"},{"src":"/(.*)","dest":"/index.html"}]}' > .vercel/output/config.json

      - name: Deploy
        id: deploy
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then PROD="--prod"; else PROD=""; fi
          url=$(vercel deploy --prebuilt $PROD --token="$VERCEL_TOKEN" 2>&1 | grep -oE 'https://[a-zA-Z0-9.-]+\.vercel\.app' | tail -1)
          if [ -z "$url" ]; then echo "Failed to extract deployment URL"; exit 1; fi
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $url"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        run: gh pr comment ${{ github.event.pull_request.number }} --body "Preview: ${{ steps.deploy.outputs.url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
